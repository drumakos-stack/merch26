<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch Rendelés 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Underground paletta */
            --bg-base: #0a0a0a;
            --bg-surface: #171717;
            --brand-green: #00ff66; /* Erős, nyers zöld */
            --brand-dark: #00cc52;
            --text-main: #f5f5f5;
            --text-muted: #a3a3a3;
            --border-color: #333333;
            --border-thick: 3px solid var(--text-main);
            --border-thin: 1px solid var(--border-color);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-base);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            min-height: 100vh;
            /* Indusztriális rács háttér */
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center top;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--bg-base); /* Hogy olvasható maradjon a tartalom */
            padding: 20px;
            border: var(--border-thick);
            box-shadow: 12px 12px 0px var(--brand-green);
        }

        header {
            text-align: left;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: var(--border-thick);
        }

        header h1 {
            color: var(--text-main);
            font-size: 3.5em;
            font-weight: 700;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1;
        }

        header h1 span {
            color: var(--brand-green);
        }

        header p {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1em;
            margin: 0;
            text-transform: uppercase;
        }

        /* Input mezők */
        .customer-info {
            background: var(--bg-surface);
            padding: 20px;
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border: var(--border-thick);
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px;
            border-radius: 0; /* Nincs lekerekítés */
            border: 2px solid var(--border-color);
            font-size: 1em;
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-base);
            color: var(--brand-green);
            transition: none;
            box-sizing: border-box;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--brand-green);
            background-color: #000;
        }

	/* --- BACKGROUND GLITCH EFFECTS --- */

body::before, body::after {
    content: "";
    position: fixed;
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh;
    pointer-events: none; /* Ensures you can still click the page */
    z-index: -1; /* Keeps the glitches strictly in the background */
}

/* Glitch Layer 1: The Green Grid Shift */
body::before {
    background-image: 
        linear-gradient(var(--brand-green) 1px, transparent 1px),
        linear-gradient(90deg, var(--brand-green) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0;
    animation: gridGlitch 6s infinite;
}

/* Glitch Layer 2: White Block Flashes */
body::after {
    background: var(--text-main);
    opacity: 0;
    mix-blend-mode: exclusion;
    animation: blockGlitch 10s infinite;
}

/* The Grid Glitch Animation */
@keyframes gridGlitch {
    0%, 92%, 96%, 100% { opacity: 0; transform: translate(0, 0); clip-path: inset(0 0 0 0); }
    93% { opacity: 0.4; transform: translate(-10px, 5px); clip-path: inset(15% 0 60% 0); }
    94% { opacity: 0; }
    95% { opacity: 0.4; transform: translate(10px, -5px); clip-path: inset(70% 0 10% 0); }
}

/* The Block Glitch Animation */
@keyframes blockGlitch {
    0%, 95%, 98%, 100% { opacity: 0; clip-path: inset(0 0 0 0); transform: translateX(0); }
    96% { opacity: 0.15; clip-path: inset(30% 0 50% 0); transform: translateX(-20px); }
    97% { opacity: 0; }
    99% { opacity: 0.15; clip-path: inset(80% 0 5% 0); transform: translateX(20px); }
}
        /* Kártyák */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .card {
            background: var(--bg-surface);
            border: var(--border-thick);
            padding: 0; 
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 6px 6px 0px var(--text-main);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .card:hover {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0px var(--brand-green);
        }

        .image-container {
            border-bottom: var(--border-thick);
            background: transparent;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img {
            width: 100%;
            aspect-ratio: 1 / 1; 
            object-fit: contain;   
            display: block;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .card:hover img {
            transform: scale(1.05); /* Pici durva ugrás a képen hovernél */
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card h3 { 
            margin: 0 0 10px 0; 
            font-size: 1.5em; 
            text-transform: uppercase;
        }

        .price { 
            font-family: 'JetBrains Mono', monospace;
            color: var(--brand-green); 
            font-size: 1.2em; 
            font-weight: 700;
            margin: 0 0 20px 0;
            background: rgba(0, 255, 102, 0.1);
            padding: 5px 10px;
            border: 1px solid var(--brand-green);
            width: fit-content;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto; 
        }

        .controls-row {
            display: flex;
            gap: 10px;
        }

        .controls-row > * {
            flex: 1;
        }

        /* Gombok */
        button {
            border-radius: 0;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            box-sizing: border-box;
        }

        button.add-btn {
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            font-size: 1em;
            padding: 12px;
            width: 100%;
            margin-top: 10px;
            box-shadow: 4px 4px 0px var(--text-main);
            transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
        }

        button.add-btn:hover {
            background: var(--text-main);
            color: var(--bg-base);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--brand-green);
            border-color: var(--brand-green);
        }

        button.add-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px transparent;
        }

        /* Rendelés szekció */
        .order-section {
            background: var(--bg-surface);
            padding: 30px;
            border: var(--border-thick);
            margin-bottom: 20px;
        }

        .order-section h2 {
            margin-top: 0;
            color: var(--brand-green);
            font-size: 2em;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
            font-family: 'JetBrains Mono', monospace;
        }

        th, td {
            text-align: left;
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        th { 
            background-color: var(--bg-base);
            color: var(--text-main);
            text-transform: uppercase;
            font-family: 'Space Grotesk', sans-serif;
        }

        tbody tr:hover {
            background: #222;
        }

        .item-name { font-weight: 700; color: var(--text-main); font-family: 'Space Grotesk', sans-serif; font-size: 1.1em; text-transform: uppercase;}
        .item-customer { font-size: 0.85em; color: var(--text-muted); }
        .item-price { color: var(--brand-green); }

        button.remove-btn {
            background: #ff003c;
            color: white;
            border: 2px solid #ff003c;
            padding: 5px 15px;
            font-size: 1em;
            box-shadow: 2px 2px 0px white;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button.remove-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px transparent;
        }

        .total-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: var(--border-thick);
        }

        .total-price {
            font-size: 2em;
            font-weight: 700;
            text-transform: uppercase;
        }

        .total-price span {
            color: var(--brand-green);
            font-family: 'JetBrains Mono', monospace;
        }

        .export-btn {
            background: var(--brand-green);
            color: var(--bg-base);
            border: 3px solid var(--brand-green);
            padding: 15px 40px;
            font-size: 1.2em;
            box-shadow: 6px 6px 0px var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.1s;
        }

        .export-btn:hover {
            background: transparent;
            color: var(--brand-green);
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0px var(--text-main);
        }

        .export-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px transparent;
        }

        .export-btn:disabled {
            background: var(--border-color);
            border-color: var(--border-color);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 768px) {
            .customer-info { grid-template-columns: 1fr; }
            .total-container {
                flex-direction: column;
                gap: 20px;
                text-align: left;
                align-items: stretch;
            }
            .export-btn { width: 100%; justify-content: center; }
            header h1 { font-size: 2.5em; }
        }

    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Merch <span>//</span> Rendelés</h1>
        <p>[ System.Online ] // FAKT Szakkollégium 2026.</p>
    </header>

    <div class="customer-info">
        <input type="text" id="customerName" placeholder="[ MEGRENDELŐ NEVE ] *" required>
        <input type="text" id="orderNote" placeholder="[ MEGJEGYZÉS / OPCIONÁLIS ]">
    </div>

    <div class="product-grid" id="productGrid">
        <!-- JS generálja -->
    </div>

    <div class="order-section">
        <h2>>> Aktuális Kosár</h2>
        <div class="table-responsive">
            <table id="orderTable">
                <thead>
                    <tr>
                        <th>Termék</th>
                        <th>Szín</th>
                        <th>Méret</th>
                        <th>Db</th>
                        <th>Ár</th>
                        <th>#</th>
                    </tr>
                </thead>
                <tbody id="orderBody">
                    <!-- Rendelések -->
                </tbody>
            </table>
        </div>
        <div class="total-container">
            <div class="total-price">
                Összesen: <span id="totalPrice">0</span> HUF
            </div>
            <button class="export-btn" onclick="sendOrderToCloud()">
                <span>[ RENDELÉS LEADÁSA ]</span>
            </button>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxWygdxABSvkdhIreCyDIL-ARsaKIH0p3d187IgjN56l0toR3nR31TZkXvvNkgmfg/exec";

    const products = [
        { 
            id: 1, 
            name: "Kapucnis pulcsi (hímzett)", 
            price: 6000, 
            colors: ["Forest Green", "Paragon", "Carolina Blue", "Cocoa", "Aquatic", "Black", "White"], 
            sizes: ["S", "M", "L", "XL", "XXL"],
            images: {
                "Forest Green": "https://i.ibb.co/7J9RrsjC/forest.png",
                "Paragon": "https://i.ibb.co/NgLY6KRh/paragon.png",
                "Carolina Blue": "https://i.ibb.co/GmM5mn0/carolina.png",
                "Cocoa": "https://i.ibb.co/C3QRNPLt/cocoa.png",
                "Aquatic": "https://i.ibb.co/7dpMB3s7/aquatic.png",
                "Black": "https://i.ibb.co/78QqVBG/black.png",
                "White": "https://i.ibb.co/23Qw5xL8/white.png"
            }
        },
        { 
            id: 2, 
            name: "Környakas pulcsi (hímzett)", 
            price: 5000, 
            colors: ["Forest Green", "Paragon", "Navy", "Cocoa", "Black", "White"], 
            sizes: ["S", "M", "L", "XL", "XXL"],
            images: {
                "Forest Green": "https://i.ibb.co/HfWDYyPQ/forest.png",
                "Paragon": "https://i.ibb.co/dw3vzS1h/paragon.png",
                "Navy": "https://i.ibb.co/XrW53n0N/navy.png",
                "Cocoa": "https://i.ibb.co/v6dJK3Ft/cocoa.png",
                "Black": "https://i.ibb.co/tPTGQ41G/black.png",
                "White": "https://i.ibb.co/9Cyf54q/white.png"
            }
        },
        { 
            id: 3, 
            name: "Galléros póló (hímzett)", 
            price: 4550, 
            colors: ["Forest Green", "Black", "White"], 
            sizes: ["S", "M", "L", "XL", "XXL"],
            images: {
                "Forest Green": "https://i.ibb.co/Q3xtGk97/forest.png",
                "Black": "https://i.ibb.co/xTqQkGm/black.png",
                "White": "https://i.ibb.co/35pQPhqd/white.png"
            }
        },
        { 
            id: 4, 
            name: "Tesipóló", 
            price: 2800, 
            colors: ["Fehér"], 
            sizes: ["XS", "S", "M", "L", "XL", "XXL"],
            images: {
                "Fehér": "https://i.ibb.co/TMS3XKqY/tesi.png"
            }
        },
        { 
            id: 5, 
            name: "Zokni", 
            price: 1225, 
            colors: ["Zöld", "Fehér"], 
            sizes: ["35-38", "39-42", "43-46"],
            images: {
                "Zöld": "https://i.ibb.co/zTtzb495/z-ld.png",
                "Fehér": "https://i.ibb.co/PZMgTNpG/feh-r.png"
            }
        },
        { 
            id: 6, 
            name: "Fekete póló", 
            price: 4000, 
            colors: ["Black"], 
            sizes: ["XS", "S", "M", "L", "XL", "XXL"],
            images: {
                "Black": "https://i.ibb.co/KcBKP02z/fekete.png"
            }
        }
    ];

    let basket = [];

    function updateProductImage(productId) {
        const product = products.find(p => p.id === productId);
        const colorSelect = document.getElementById(`color-${productId}`);
        const selectedColor = colorSelect.value;
        const imgElement = document.getElementById(`img-${productId}`);
        const newImgSrc = product.images[selectedColor];

        if (newImgSrc) {
            imgElement.src = newImgSrc;
        }
    }

    function initProducts() {
        const grid = document.getElementById('productGrid');
        products.forEach(p => {
            const defaultColor = p.colors[0]; 
            const defaultImg = p.images[defaultColor]; 

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="image-container">
                    <img src="${defaultImg}" alt="${p.name}" id="img-${p.id}">
                </div>
                <div class="card-content">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price.toLocaleString('hu-HU')} HUF</div>
                    <div class="controls">
                        <select id="color-${p.id}" onchange="updateProductImage(${p.id})">
                            ${p.colors.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                        <div class="controls-row">
                            <select id="size-${p.id}">
                                ${p.sizes.map(s => `<option value="${s}">${s}</option>`).join('')}
                            </select>
                            <input type="number" id="qty-${p.id}" value="1" min="1" title="Darabszám">
                        </div>
                        <button class="add-btn" onclick="addToBasket(${p.id})">+ Kosárba</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function addToBasket(productId) {
        const customerInput = document.getElementById('customerName');
        const customer = customerInput.value.trim(); 

        if (customer === "") {
            alert("[ ERROR ] Add meg a neved!");
            customerInput.focus(); 
            return; 
        }

        const product = products.find(p => p.id === productId);
        const color = document.getElementById(`color-${productId}`).value;
        const size = document.getElementById(`size-${productId}`).value;
        const qtyInput = document.getElementById(`qty-${productId}`).value;
        const qty = parseInt(qtyInput, 10);
        const note = document.getElementById('orderNote').value || "-";

        if (isNaN(qty) || qty < 1) {
            alert("[ ERROR ] Érvénytelen darabszám!");
            return;
        }

        const orderItem = {
            customer: customer,
            product: product.name,
            color: color,
            size: size,
            quantity: qty,          
            price: product.price * qty, 
            note: note,
            timestamp: new Date().toLocaleString('hu-HU')
        };

        basket.push(orderItem);
        renderTable();
    }

    function removeItem(index) {
        basket.splice(index, 1);
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('orderBody');
        tbody.innerHTML = '';
        let total = 0;

        basket.forEach((item, index) => {
            total += item.price;
            tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="item-name">${item.product}</div>
                        <div class="item-customer">// ${item.customer}</div>
                    </td>
                    <td>${item.color}</td>
                    <td><strong>${item.size}</strong></td>
                    <td>${item.quantity}x</td>
                    <td class="item-price">${item.price.toLocaleString('hu-HU')} Ft</td>
                    <td><button class="remove-btn" onclick="removeItem(${index})">X</button></td>
                </tr>
            `;
        });

        document.getElementById('totalPrice').innerText = total.toLocaleString('hu-HU');
    }

    async function sendOrderToCloud() {
        const customerInput = document.getElementById('customerName');
        
        if (customerInput.value.trim() === "") {
            alert("[ ERROR ] Nincs név megadva!");
            customerInput.focus();
            return;
        }

        if (basket.length === 0) {
            alert("[ ERROR ] Üres kosár!");
            return;
        }

        const btn = document.querySelector('.export-btn span');
        const originalText = btn.innerText;
        btn.innerText = "[ FELDOLGOZÁS... ]";
        document.querySelector('.export-btn').disabled = true;

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(basket),
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'text/plain' 
                }
            });

            alert("[ SUCCESS ] Rendelés rögzítve a szerveren.");
            
            basket = [];
            customerInput.value = "";
            document.getElementById('orderNote').value = "";
            renderTable();

        } catch (error) {
            alert("[ FATAL ] Kommunikációs hiba. Próbáld újra.");
            console.error(error);
        } finally {
            btn.innerText = originalText;
            document.querySelector('.export-btn').disabled = false;
        }
    }

    initProducts();
</script>

</body>
</html>
