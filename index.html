<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch Rendelés 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Underground paletta */
            --bg-base: #0a0a0a;
            --bg-surface: #171717;
            --brand-green: #00ff66; /* Erős, nyers zöld */
            --brand-dark: #00cc52;
            --text-main: #f5f5f5;
            --text-muted: #a3a3a3;
            --border-color: #333333;
            --border-thick: 3px solid var(--text-main);
            --border-thin: 1px solid var(--border-color);
        }
        /* A szöveg kijelölésének színe az egész oldalon */
        ::selection {
            background-color: var(--brand-green); /* A háttér neon zöld lesz */
            color: var(--bg-base);               /* A szöveg pedig fekete */
        }

/* Firefox támogatáshoz (opcionális, de ajánlott) */
        ::-moz-selection {
            background-color: var(--brand-green);
            color: var(--bg-base);
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-base);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            min-height: 100vh;
            /* Indusztriális rács háttér */
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center top;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--bg-base); /* Hogy olvasható maradjon a tartalom */
            padding: 20px;
            border: var(--border-thick);
            box-shadow: 12px 12px 0px var(--brand-green);
        }

        header {
            text-align: left;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: var(--border-thick);
        }

        header h1 {
            color: var(--text-main);
            font-size: 3.5em;
            font-weight: 700;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1;
        }

        header h1 span {
            color: var(--brand-green);
        }

        header p {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1em;
            margin: 0;
            text-transform: uppercase;
        }

        /* Input mezők */
        .customer-info {
            background: var(--bg-surface);
            padding: 20px;
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border: var(--border-thick);
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px;
            border-radius: 0; /* Nincs lekerekítés */
            border: 2px solid var(--border-color);
            font-size: 1em;
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-base);
            color: var(--brand-green);
            transition: none;
            box-sizing: border-box;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--brand-green);
            background-color: #000;
            caret-color: var(--brand-green);
        }

    /* --- BACKGROUND GLITCH EFFECTS --- */

body::before, body::after {
    content: "";
    position: fixed;
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh;
    pointer-events: none; /* Ensures you can still click the page */
    z-index: -1; /* Keeps the glitches strictly in the background */
}

/* Glitch Layer 1: The Green Grid Shift */
body::before {
    background-image: 
        linear-gradient(var(--brand-green) 1px, transparent 1px),
        linear-gradient(90deg, var(--brand-green) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0;
    animation: gridGlitch 6s infinite;
}

/* Glitch Layer 2: White Block Flashes */
body::after {
    background: var(--text-main);
    opacity: 0;
    mix-blend-mode: exclusion;
    animation: blockGlitch 10s infinite;
}

/* The Grid Glitch Animation */
@keyframes gridGlitch {
    0%, 92%, 96%, 100% { opacity: 0; transform: translate(0, 0); clip-path: inset(0 0 0 0); }
    93% { opacity: 0.4; transform: translate(-10px, 5px); clip-path: inset(15% 0 60% 0); }
    94% { opacity: 0; }
    95% { opacity: 0.4; transform: translate(10px, -5px); clip-path: inset(70% 0 10% 0); }
}

/* The Block Glitch Animation */
@keyframes blockGlitch {
    0%, 95%, 98%, 100% { opacity: 0; clip-path: inset(0 0 0 0); transform: translateX(0); }
    96% { opacity: 0.15; clip-path: inset(30% 0 50% 0); transform: translateX(-20px); }
    97% { opacity: 0; }
    99% { opacity: 0.15; clip-path: inset(80% 0 5% 0); transform: translateX(20px); }
}
        /* Kártyák */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .card {
            background: var(--bg-surface);
            border: var(--border-thick);
            padding: 0; 
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 6px 6px 0px var(--text-main);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .card:hover {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0px var(--brand-green);
        }

        .image-container {
            border-bottom: var(--border-thick);
            background: transparent;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img {
            width: 100%;
            aspect-ratio: 1 / 1; 
            object-fit: contain;   
            display: block;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .card:hover img {
            transform: scale(1.05); /* Pici durva ugrás a képen hovernél */
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card h3 { 
            margin: 0 0 10px 0; 
            font-size: 1.5em; 
            text-transform: uppercase;
        }

        /* --- DINAMIKUS ÁRAK STÍLUSAI --- */
        .price-container {
            display: flex;
            gap: 15px;
            align-items: center;
            margin: 0 0 20px 0;
        }

        .price { 
            font-family: 'JetBrains Mono', monospace;
            color: var(--brand-green); 
            font-size: 1.2em; 
            font-weight: 700;
            background: rgba(0, 255, 102, 0.1);
            padding: 5px 10px;
            border: 1px solid var(--brand-green);
            margin: 0;
        }

        .dynamic-price {
            font-family: 'JetBrains Mono', monospace;
            color: #ffaa00; 
            font-size: 0.7em;
            font-weight: 700;
            background: rgba(255, 170, 0, 0.1);
            padding: 5px 10px;
            border: 1px dashed #ffaa00;
        }

        .dynamic-price.loading {
            color: var(--text-muted);
            border-color: var(--border-color);
            background: transparent;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        /* --- STÍLUSOK VÉGE --- */

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto; 
        }

        .controls-row {
            display: flex;
            gap: 10px;
        }

        .controls-row > * {
            flex: 1;
        }

        /* Gombok */
        button {
            border-radius: 0;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            box-sizing: border-box;
        }

        button.add-btn {
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            font-size: 1em;
            padding: 12px;
            width: 100%;
            margin-top: 10px;
            box-shadow: 4px 4px 0px var(--text-main);
            transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
        }

        button.add-btn:hover {
            background: var(--text-main);
            color: var(--bg-base);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--brand-green);
            border-color: var(--brand-green);
        }

        button.add-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px transparent;
        }

/* MODAL MÉRETTÁBLÁZATNAK */
.modal {
    display: none; /* Alapból rejtve */
    position: fixed;
    z-index: 1000;
    left: 0; top: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
}

.modal-content {
    background-color: var(--bg-surface);
    margin: 5% auto;
    padding: 30px;
    border: var(--border-thick);
    width: 90%;
    max-width: 600px;
    position: relative;
    box-shadow: 15px 15px 0px var(--brand-green);
}

.close-modal {
    position: absolute;
    right: 15px; top: 10px;
    color: var(--text-main);
    font-size: 28px;
    cursor: pointer;
}

.modal-content table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 20px;
}

.modal-content th, .modal-content td {
    border: 1px solid var(--border-color);
    padding: 10px;
    text-align: center;
}

.modal-content th { background: var(--bg-base); color: var(--brand-green); }

        /* Rendelés szekció */

        }

        button.remove-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px transparent;
        }

        .total-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: var(--border-thick);
        }

            font-size: 2em;
            font-weight: 700;
            text-transform: uppercase;
        }

            color: var(--brand-green);
            font-family: 'JetBrains Mono', monospace;
        }

        .export-btn {
            background: var(--brand-green);
            color: var(--bg-base);
            border: 3px solid var(--brand-green);
            padding: 15px 40px;
            font-size: 1.2em;

            align-items: center;
            gap: 10px;
            transition: all 0.1s;

            background: transparent;
            color: var(--brand-green);
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0px var(--text-main);
        }

        .export-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px transparent;
        }

        .export-btn:disabled {
            background: var(--border-color);
            border-color: var(--border-color);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 768px) {
            .customer-info { grid-template-columns: 1fr; }
            .total-container {
                flex-direction: column;
                gap: 20px;
                text-align: left;
                align-items: stretch;
            }
            .export-btn { width: 100%; justify-content: center; }
            header h1 { font-size: 2.5em; }
        }

    </style>
</head>

    let basket = [];

    function updateProductImage(productId) {
        const product = products.find(p => p.id === productId);
        const colorSelect = document.getElementById(`color-${productId}`);
        const selectedColor = colorSelect.value;
        const imgElement = document.getElementById(`img-${productId}`);
        const newImgSrc = product.images[selectedColor];

        if (newImgSrc) {
            imgElement.src = newImgSrc;
        }
    }

    function initProducts() {
        const grid = document.getElementById('productGrid');
        products.forEach(p => {
            const defaultColor = p.colors[0]; 
            const defaultImg = p.images[defaultColor]; 

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="image-container">
                    <img src="${defaultImg}" alt="${p.name}" id="img-${p.id}">
                </div>
                <div class="card-content">
                    <h3>${p.name}</h3>
                    
                    <div class="price-container">
                        <div class="price" title="Alapár">${p.price.toLocaleString('hu-HU')} HUF</div>
                        <div class="dynamic-price loading" id="dyn-price-${p.id}">[ FETCHING... ]</div>
                    </div>

            <button class="size-guide-btn" onclick="openSizeChart(${p.id})">Mérettáblázat</button>
                    <div class="controls">
                        <select id="color-${p.id}" onchange="updateProductImage(${p.id})">
                            ${p.colors.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                        <div class="controls-row">
                            <select id="size-${p.id}">
                                ${p.sizes.map(s => `<option value="${s}">${s}</option>`).join('')}
                            </select>
                            <input type="number" id="qty-${p.id}" value="1" min="1" title="Darabszám">
                        </div>
                        <button class="add-btn" onclick="addToBasket(${p.id})">+ Kosárba</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function addToBasket(productId) {
        const customerInput = document.getElementById('customerName');
        const customer = customerInput.value.trim(); 

        if (customer === "") {
            alert("[ ERROR ] Add meg a neved!");
            customerInput.focus(); 
            return; 
        }

        const product = products.find(p => p.id === productId);
        const color = document.getElementById(`color-${productId}`).value;
        const size = document.getElementById(`size-${productId}`).value;
        const qtyInput = document.getElementById(`qty-${productId}`).value;
        const qty = parseInt(qtyInput, 10);
        const note = document.getElementById('orderNote').value || "-";

        if (isNaN(qty) || qty < 1) {
            alert("[ ERROR ] Érvénytelen darabszám!");
            return;
        }

        const orderItem = {
            customer: customer,
            product: product.name,
            color: color,
            size: size,
            quantity: qty,          
            price: product.price * qty, 
            note: note,
            timestamp: new Date().toLocaleString('hu-HU')
        };

        basket.push(orderItem);
        renderTable();
    }

    function removeItem(index) {
        basket.splice(index, 1);
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('orderBody');
        tbody.innerHTML = '';
        let total = 0;

        basket.forEach((item, index) => {
            total += item.price;
            tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="item-name">${item.product}</div>
                        <div class="item-customer">// ${item.customer}</div>
                    </td>
                    <td>${item.color}</td>
                    <td><strong>${item.size}</strong></td>
                    <td>${item.quantity}x</td>
                    <td class="item-price">${item.price.toLocaleString('hu-HU')} Ft</td>
                    <td><button class="remove-btn" onclick="removeItem(${index})">X</button></td>
                </tr>
            `;
        });

        document.getElementById('totalPrice').innerText = total.toLocaleString('hu-HU');
    }
    
    function openSizeChart(id) {
    const p = products.find(x => x.id === id);
    document.getElementById('modalTitle').innerText = p.name;
    document.getElementById('modalBody').innerHTML = p.sizeChart;
    document.getElementById('sizeModal').style.display = "block";
}

function closeModal() {
    document.getElementById('sizeModal').style.display = "none";
}

// Ha a modál mellé kattintanak, akkor is záródjon be
window.onclick = function(event) {
    if (event.target == document.getElementById('sizeModal')) {
        closeModal();
    }
}

async function fetchDynamicPrices() {
        try {
            const response = await fetch(WEB_APP_URL); 
            const dynamicPrices = await response.json();

            // Végigmegyünk a frontend termékeken
            products.forEach(p => {
                const dynPriceElement = document.getElementById(`dyn-price-${p.id}`);
                if (dynPriceElement) {
                    // A Google Sheetből érkezett nevet (p.name) használjuk kulcsként
                    if (dynamicPrices[p.name] !== undefined) {
                        const onlinePrice = dynamicPrices[p.name];
                        
                        // UI frissítése a kért szöveggel és a kerekített árral
                        dynPriceElement.innerText = `jelenlegi, kalkulált ár: ${onlinePrice.toLocaleString('hu-HU')} HUF`;
                        dynPriceElement.classList.remove('loading');
                        
                        // HA AZT AKAROD, HOGY A KOSÁRBA A DINAMIKUS ÁR KERÜLJÖN, VEDD KI A KOMMENTET INNEN:
                        // p.price = onlinePrice; 
                    } else {
                        dynPriceElement.innerText = "[ N/A ]";
                        dynPriceElement.classList.remove('loading');
                    }
                }
            });
        } catch (error) {
            console.error("[ ERROR ] Nem sikerült letölteni a dinamikus árakat.", error);
            document.querySelectorAll('.dynamic-price').forEach(el => {
                el.innerText = "[ SYNC ERROR ]";
                el.classList.remove('loading');
                el.style.color = "#ff003c";
                el.style.borderColor = "#ff003c";
            });
        }
    }
    async function sendOrderToCloud() {
        const customerInput = document.getElementById('customerName');
        
        if (customerInput.value.trim() === "") {
            alert("[ ERROR ] Nincs név megadva!");
            customerInput.focus();
            return;
        }

        if (basket.length === 0) {
            alert("[ ERROR ] Üres kosár!");
            return;
        }

        const btn = document.querySelector('.export-btn span');
        const originalText = btn.innerText;
        btn.innerText = "[ FELDOLGOZÁS... ]";
        document.querySelector('.export-btn').disabled = true;

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(basket),
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'text/plain' 
                }
            });

            alert("[ SUCCESS ] Rendelés rögzítve a szerveren.");
            
            basket = [];
            customerInput.value = "";
            document.getElementById('orderNote').value = "";
            renderTable();

        } catch (error) {
            alert("[ FATAL ] Kommunikációs hiba. Próbáld újra.");
            console.error(error);
        } finally {
            btn.innerText = originalText;
            document.querySelector('.export-btn').disabled = false;
        }
    }

    // Rendszer indítása
    initProducts();
    fetchDynamicPrices(); // Lekérjük az online árakat a betöltés után

</script>
